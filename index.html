<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive Offer Form</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #007BFF; color: white; border: none; cursor: pointer; width: 100%; }
        button:hover { background-color: #0056b3; }
        #statusMessage { margin-top: 15px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <h2>Claim Your Offer</h2>
    
    <form id="leadForm">
        <div class="form-group">
            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" placeholder="+60 01111615516" required>
        </div>

        <div class="form-group">
            <label for="gender">Gender:</label>
            <select id="gender" name="gender" required>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div class="form-group">
            <label for="smoking">Smoking Status:</label>
            <select id="smoking" name="smoking" required>
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>
        </div>

        <div class="form-group">
            <label for="occupation">Occupation Risk:</label>
            <select id="occupation" name="occupation" required>
                <option value="safe">Safe (Office/Indoor)</option>
                <option value="hazardous">Hazardous (Manual/Outdoor)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="age">Age Range:</label>
            <select id="age" name="age" required>
                <option value="18-20">18-20</option>
                <option value="21-25">21-25</option>
                <option value="26-30">26-30</option>
                <option value="31+">31+</option>
            </select>
        </div>

        <button type="submit" id="submitBtn">Submit Details</button>
    </form>

    <div id="statusMessage"></div>

    <script>
        // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzKY8jHo5m7pXIu3igzlXQGixTasT39cAkzg6q0N7rVB4JKq1EQ8je7prtCiGEh3nm8VQ/exec';

        document.getElementById('leadForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Prevent default form submission reload
            
            const btn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('statusMessage');
            
            btn.innerText = 'Submitting...';
            btn.disabled = true;
            statusDiv.innerText = '';
            statusDiv.style.color = 'black';

            // Gather data from the form
            const formData = {
                phone: document.getElementById('phone').value,
                gender: document.getElementById('gender').value,
                smoking: document.getElementById('smoking').value,
                occupation: document.getElementById('occupation').value,
                age: document.getElementById('age').value
            };

            try {
                // Send a POST request to the Google Apps Script Web App
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    // Using text/plain prevents CORS preflight issues with Google Apps Script
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (result.status === 'success') {
                    statusDiv.innerText = 'Details submitted successfully!';
                    statusDiv.style.color = 'green';
                    document.getElementById('leadForm').reset();
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error('Error!', error);
                statusDiv.innerText = 'Submission failed. Please try again.';
                statusDiv.style.color = 'red';
            } finally {
                btn.innerText = 'Submit Details';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
